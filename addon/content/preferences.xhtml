<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <hbox align="center" style="margin: 6px 0;">
    <label value="API Key" style="min-width: 130px;" />
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-api-key"
      style="flex: 1; min-width: 280px;"
    />
  </hbox>

  <hbox align="center" style="margin: 6px 0;">
    <label value="API Base URL" style="min-width: 130px;" />
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-api-base-url"
      style="flex: 1; min-width: 280px;"
    />
  </hbox>

  <hbox align="center" style="margin: 6px 0;">
    <label value="Model" style="min-width: 130px;" />
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-api-model"
      style="flex: 1; min-width: 280px;"
    />
  </hbox>

  <hbox align="center" style="margin: 6px 0;">
    <label value="Target Language" style="min-width: 130px;" />
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-target-language"
      style="flex: 1; min-width: 280px;"
    />
  </hbox>

  <description style="margin-top: 10px; color: #888; font-size: small;">
    Base URL: https://api.openai.com/v1 (OpenAI) · https://api.deepseek.com/v1 (DeepSeek) · http://localhost:11434/v1 (Ollama)
  </description>
</groupbox>
